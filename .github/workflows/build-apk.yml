name: Build Android Standalone APK

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build:
    # We use Ubuntu because Linux servers are much faster and cheaper than Windows ones
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Node.js (Matching your local v22)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Set up Java 17 (Crucial for React Native / Expo)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Install your NPM dependencies
      - name: Install Node Modules
        run: npm install

      # 5. Generate the Android folder cleanly (Just in case it isn't in your repo)
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      # 6. Do the heavy lifting! Build the Release APK
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease
        # Giving Gradle plenty of RAM so the GitHub runner doesn't crash
        env:
          GRADLE_OPTS: "-Xmx4096m"

      # 7. Take the finished APK and upload it so you can download it
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

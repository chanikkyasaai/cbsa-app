name: Build Android Standalone APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Node & NPM Cache first
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 2. Install dependencies
      - name: Install Node Modules
        run: npm install

      # 3. GENERATE the Android folder (This creates the .gradle files)
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      # 4. NOW set up Java and Gradle Cache (It will find the files now!)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' 

      # 5. Cache the heavy C++ NDK files
      - name: Cache Android C++ Build (NDK)
        uses: actions/cache@v4
        with:
          path: android/app/.cxx
          key: ${{ runner.os }}-cxx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cxx-

      # 6. Build the APK (with Lint checks disabled to prevent false-positive crashes)
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --build-cache -x lint -x lintVitalRelease
        env:
          GRADLE_OPTS: "-Xmx4096m -Dorg.gradle.caching=true"

      # 7. Upload the finished file as a workflow artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # 8. Publish a GitHub Release with the APK attached
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} (${{ env.SHORT_SHA }})"
          body: |
            Automated Android APK build from commit ${{ github.sha }}.
          files: android/app/build/outputs/apk/release/app-release.apk
          prerelease: true
